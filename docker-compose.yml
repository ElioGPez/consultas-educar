services:
  app:
    image: ${DOCKER_USERNAME:-yourusername}/consultas-app:latest
    container_name: consultas_app
    restart: always
    ports:
      - "8000:80" # Tu Nginx local puede apuntar al puerto 8000
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-consultas}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - storage_data:/var/www/html/storage

  cron:
    image: ${DOCKER_USERNAME:-yourusername}/consultas-app:latest
    container_name: consultas_cron
    restart: always
    command: php artisan schedule:work
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-consultas}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - storage_data:/var/www/html/storage

  db:
    image: mysql:8.0
    container_name: consultas_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-consultas}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 10
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
  storage_data:
