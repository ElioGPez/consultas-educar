name: Deploy to Donweb VPS (Docker)

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/consultas-app:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # === COPY DOCKER-COMPOSE TO VPS ===
      - name: Deploy docker-compose to VPS
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-avz --delete"
          SOURCE: "docker-compose.yml"
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          REMOTE_PORT: ${{ secrets.SERVER_PORT }}
          TARGET: ${{ secrets.SERVER_PATH }} # Example: /opt/consultas-app

      # === PULL AND RESTART CONTAINERS ===
      - name: Restart Docker Containers on VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ${{ secrets.SERVER_PATH }}
            
            # Exportar variables para que docker-compose las interpole
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            export DB_DATABASE=${{ secrets.DB_DATABASE }}
            export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            
            # Descargar la imagen recién compilada
            docker compose pull
            
            # Levantar contenedores (recrea si hay nueva imagen)
            docker compose up -d
            
            # Configurar el framework en producción
            docker compose exec -T app php artisan config:cache
            docker compose exec -T app php artisan route:cache
            docker compose exec -T app php artisan view:cache
            
            # Correr migraciones
            docker compose exec -T app php artisan migrate --force
